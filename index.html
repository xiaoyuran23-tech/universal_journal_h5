<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-title" content="万物手札">
    <meta name="application-name" content="万物手札">
    <meta name="theme-color" content="#ffffff">
    
    <!-- PWA 配置 -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <!-- 防止浏览器缓存 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>万物手札 v7.3.0 - 记录世间万物</title>
    <link rel="stylesheet" href="style.css?v=7.3.0">
    <link rel="stylesheet" href="animations.css?v=7.3.0">

    <!-- Content Security Policy (CSP) - 仅允许同源资源 + ECharts CDN -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://api.github.com http://localhost:*; font-src 'self'; media-src 'self' blob:;">

    <!-- ECharts CDN (带 SRI 完整性校验) -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"
            integrity="sha384-BQKzmHvQLMCAnL3UtDBA1Al5tFjsCz1wrMlIUA1wkzo14DYkRWjywW+p9pCj0cwd"
            crossorigin="anonymous"></script>
    

    <!-- iOS 兼容性修复 -->
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('Error: ' + msg + '\nURL: ' + url + '\nLine: ' + lineNo + '\nColumn: ' + columnNo + '\nStack: ' + (error && error.stack));
            window.__lastError = msg + ' (Line ' + lineNo + ')';
            return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
            console.error('Unhandled Rejection: ' + event.reason);
            window.__lastError = 'Unhandled Rejection: ' + event.reason;
        });
        window.isIOSStandalone = window.navigator.standalone || false;
        
        window.safeLocalStorage = {
            setItem: function(key, value) {
                try { localStorage.setItem(key, value); } catch (e) { console.warn('localStorage 写入失败:', e); }
            },
            getItem: function(key) {
                try { return localStorage.getItem(key); } catch (e) { console.warn('localStorage 读取失败:', e); return null; }
            }
        };

        // API 地址配置 (dev 使用 Vite 代理到远程，production 使用同源)
        window.JOURNAL_API_URL = '/api';

        // PWA Service Worker 注册
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js?v=7.0.2').then(reg => {
                    console.log('SW registered: ', reg);
                }).catch(err => {
                    console.log('SW registration failed: ', err);
                });
            });
        }
    </script>
</head>
<body data-theme="botanical">
    <!-- 热植主题背景装饰（仅 data-theme="botanical" 时可见） -->
    <div class="botanical-bg" id="botanical-bg" aria-hidden="true">
        <div class="wash w1"></div>
        <div class="wash w2"></div>
        <div class="wash w3"></div>
        <div class="begonia b1"></div>
        <div class="begonia b2"></div>
        <div class="begonia b3"></div>
        <div class="begonia b4"></div>
        <div class="begonia b5"></div>
        <div class="fern f1"><i class="arm a1"></i><i class="arm a2"></i><i class="arm a3"></i></div>
        <div class="fern f2"><i class="arm a1"></i><i class="arm a2"></i><i class="arm a3"></i></div>
        <div class="fern f3"><i class="arm a1"></i><i class="arm a2"></i><i class="arm a3"></i></div>
    </div>
    <!-- 底部标签栏 - 浮动胶囊式 -->
    <nav class="tab-bar" id="tab-bar">
        <button class="tab-btn active" data-page="home">
            <span class="tab-icon">⌂</span>
            <span>首页</span>
        </button>
        <button class="tab-btn" data-page="calendar">
            <span class="tab-icon">◷</span>
            <span>日历</span>
        </button>
        <button class="tab-btn fab-wrap" data-page="form" id="tab-fab">
            <span class="fab-circle">+</span>
            <span>新建</span>
        </button>
        <button class="tab-btn" data-page="graph">
            <span class="tab-icon">◎</span>
            <span>图谱</span>
        </button>
        <button class="tab-btn" data-page="profile">
            <span class="tab-icon">☰</span>
            <span>我的</span>
        </button>
    </nav>

    <!-- 顶部导航 -->
    <header class="header">
        <h1 class="header-title">万物手札</h1>
        <p class="header-subtitle">记录世间万物，收藏生活点滴</p>
        
        <!-- 主题切换按钮（触发全局面板） -->
        <div class="theme-selector">
            <div class="theme-toggle" id="theme-toggle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                </svg>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 首页 - 记录列表 -->
        <section id="page-home" class="page active">
            <!-- 搜索栏 -->
            <div class="search-bar">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" class="search-input" id="search-input" placeholder="搜索名称、备注、标签...">
            </div>
            
            <!-- 标签筛选 (纯标签化架构) -->
            <div class="tag-filter" id="tag-filter">
                <!-- 动态生成标签 -->
            </div>
            
            <!-- 记录列表容器 -->
            <div class="items-container" id="items-container">
                <!-- 动态生成记录卡片或空状态 -->
            </div>
        </section>

        <!-- 日历页 -->
        <section id="page-calendar" class="page">
            <div class="calendar-container" id="calendar-container">
                <!-- 动态渲染日历 -->
            </div>
            <!-- 选中日期的记录列表 -->
            <div class="calendar-day-items" id="calendar-day-items">
                <div class="calendar-day-header">
                    <h3 id="calendar-day-title">选择日期查看记录</h3>
                    <button class="cal-back-btn" id="cal-back-btn" style="display:none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <path d="M19 12H5M12 19l-7-7 7-7"></path>
                        </svg>
                        返回日历
                    </button>
                </div>
                <div class="items-container" id="calendar-items-list"></div>
            </div>
        </section>

        <!-- 时间线/故事页 -->
        <section id="page-timeline" class="page">
            <div class="timeline-container" id="timeline-container">
                <!-- 动态渲染时间线 -->
            </div>
        </section>

        <!-- 收藏页 -->
        <section id="page-favorites" class="page">
            <div class="search-bar">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" class="search-input" id="search-input-favorites" placeholder="搜索收藏记录...">
            </div>
            <div class="items-container" id="favorites-container">
                <!-- 动态生成收藏卡片 -->
            </div>
            <div class="empty-state" id="empty-favorites">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                </svg>
                <p>还没有收藏</p>
                <p class="empty-state-hint">在记录页点击收藏按钮添加</p>
            </div>
        </section>

        <!-- 关系图谱页 -->
        <section id="page-graph" class="page">
            <div class="segmented-control" id="graph-segmented">
                <button class="active" data-graph-filter="all">全部</button>
                <button data-graph-filter="tags">标签</button>
                <button data-graph-filter="month">本月</button>
            </div>
            <div class="graph-container" id="graph-container" style="width:100%;height:100%;"></div>
        </section>

        <!-- 个人页面 -->
        <section id="page-profile" class="page">
            <div class="profile-container">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="8" r="4"></circle>
                            <path d="M20 21a8 8 0 1 0-16 0"></path>
                        </svg>
                    </div>
                    <div class="profile-name-container">
                        <h2 class="profile-name" id="profile-display-name">用户</h2>
                        <button class="profile-edit-btn" id="profile-edit-btn" title="编辑昵称">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
                            </svg>
                        </button>
                    </div>
                    <input type="text" class="profile-name-input" id="profile-name-input" placeholder="输入昵称" style="display:none;" />
                    <button class="profile-save-btn" id="profile-save-btn" style="display:none;">保存</button>
                    <!-- 登录按钮 (未登录时显示) -->
                    <button class="profile-login-btn" id="profile-login-btn" style="display:none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                            <polyline points="10 17 15 12 10 7"></polyline>
                            <line x1="15" y1="12" x2="3" y2="12"></line>
                        </svg>
                        登录/注册
                    </button>
                </div>
                
                <!-- 数据可视化区域 -->
                <div class="visuals-container" id="visuals-container">
                    <!-- 动态渲染热力图、趋势图等 -->
                </div>

                <!-- v7.0.0 新增：心情打卡 + 连续记录 -->
                <div class="profile-mood-section" style="padding:16px;display:flex;gap:12px;align-items:center;justify-content:space-between;">
                    <button class="settings-item" data-mood-checkin style="flex:1;margin:0;">
                        <span>心情打卡</span>
                        <span style="font-size:20px;">😊</span>
                    </button>
                    <div id="streak-badge-container" style="min-width:80px;"></div>
                </div>

                <!-- 心情趋势区域 -->
                <div id="mood-trend-container" style="margin:0 16px 16px;border-radius:12px;background:#f8f8f8;"></div>
                
                <div class="settings-container">
                    <div class="settings-section">
                        <h3 class="settings-section-title">数据管理</h3>
                        <button class="settings-item" id="export-data-btn">
                            <span>导出数据</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                        </button>
                        <button class="settings-item" id="import-data-btn">
                            <span>导入数据 (JSON)</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                        </button>
                        <button class="settings-item" id="export-markdown-btn">
                            <span>导出为 Markdown</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                        </button>
                        <button class="settings-item" id="import-markdown-btn">
                            <span>导入 Markdown</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                            </svg>
                        </button>
                        <button class="settings-item danger-item" id="clear-all-data-btn">
                            <span>清空数据</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="#ff4d4f" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                <line x1="10" y1="11" x2="10" y2="17"></line>
                                <line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                        </button>
                    </div>
                    
                    <!-- [已移除] 分类管理模块 -->

                    <div class="settings-section">
                        <h3 class="settings-section-title">回收站</h3>
                        <button class="settings-item" id="settings-trash">
                            <span>回收站</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                    </div>

                    <div class="settings-section">
                        <h3 class="settings-section-title">模板库</h3>
                        <button class="settings-item" id="manage-templates-btn">
                            <span>我的模板</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="settings-section">
                        <h3 class="settings-section-title">云同步</h3>
                        <button class="settings-item" id="settings-cloud-config">
                            <span>同步设置</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 10h-4V6a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v4H2a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h4v4a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-4h4a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2z"></path>
                            </svg>
                        </button>
                    </div>

                    <div class="settings-section" id="account-section" style="display:none;">
                        <h3 class="settings-section-title">账号管理</h3>
                        <button class="settings-item" id="settings-change-password">
                            <span>修改密码</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </button>
                        <button class="settings-item danger-item" id="settings-delete-account">
                            <span>删除账号</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="#ff4d4f" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                        <button class="settings-item danger-item" id="settings-logout">
                            <span>退出登录</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="#ff4d4f" stroke-width="2">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                <polyline points="16 17 21 12 16 7"></polyline>
                                <line x1="21" y1="12" x2="9" y2="12"></line>
                            </svg>
                        </button>
                    </div>

                    <div class="settings-section">
                        <h3 class="settings-section-title">功能</h3>
                        <button class="settings-item" id="settings-theme">
                            <span>主题切换</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="5"></circle>
                                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                            </svg>
                        </button>
                        <button class="settings-item" id="settings-stats">
                            <span>数据统计</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path>
                                <path d="M22 12A10 10 0 0 0 12 2v10z"></path>
                            </svg>
                        </button>
                    </div>

                    <div class="settings-section">
                        <h3 class="settings-section-title">关于</h3>
                        <button class="settings-item" id="settings-about">
                            <span>关于万物手札</span>
                            <span class="about-version">v7.1.0</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 模板管理页 (保留作为完整管理入口，新建页将使用底部抽屉) -->
        <section id="page-template-manager" class="page">
            <div class="template-manager-header">
                <button class="tm-back-btn" id="tm-back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <path d="M19 12H5M12 19l-7-7 7-7"></path>
                    </svg>
                    返回
                </button>
                <h2 class="tm-title">模板管理</h2>
                <div></div>
            </div>
            <div class="template-manager-content" id="template-manager-container">
                <!-- 动态渲染模板列表 -->
            </div>
        </section>

        <!-- 新建/编辑记录页 (Sticky Header + Footer) -->
        <section id="page-form" class="page">
            <div class="form-layout">
                <!-- 顶部固定标题栏 -->
                <header class="form-header-sticky">
                    <button class="form-back-btn" id="create-back-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"></path>
                        </svg>
                        取消
                    </button>
                    <h2 class="form-title" id="create-title">新建记录</h2>
                    <div class="header-spacer"></div>
                </header>
                
                <!-- 中间滚动内容区 -->
                <div class="form-scroll">
                    <!-- 模板快捷入口 -->
                    <button class="btn-use-template" id="btn-use-template">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="12" y1="8" x2="12" y2="16"></line>
                            <line x1="8" y1="12" x2="16" y2="12"></line>
                        </svg>
                        使用模板快速创建
                    </button>
                    
                    <button class="btn-save-template" id="btn-save-template">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                        保存当前内容为模板
                    </button>
                    
                    <div class="form-group">
                        <label for="create-name">名称</label>
                        <input type="text" id="create-name" placeholder="给这条记录起个名字" maxlength="100" autocomplete="off">
                    </div>
                    
                    <!-- [已移除] 分类选择器 -->
                    
                    <div class="form-group">
                        <label>标签</label>
                        <div class="tag-input-wrapper" id="tag-input-wrapper">
                            <input type="text" class="tag-input-field" id="create-tags" placeholder="输入标签，按回车或逗号添加" autocomplete="off">
                        </div>
                        <p class="form-hint">按回车、逗号或空格分隔标签，重复标签自动忽略</p>
                        <div class="tag-suggestions" id="tag-suggestions"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="create-rich-content">备注 (支持富文本)</label>
                        <div class="rich-editor" id="create-rich-content" contenteditable="true" placeholder="写下你的想法..."></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="create-status">状态</label>
