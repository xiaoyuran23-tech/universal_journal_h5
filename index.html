<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-title" content="万物手札">
    <meta name="application-name" content="万物手札">
    <meta name="theme-color" content="#ffffff">
    
    <!-- 防止浏览器缓存 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>万物手札 v2.5.0 - 记录世间万物</title>
    <link rel="stylesheet" href="style.css?v=2.7.0">
    <link rel="stylesheet" href="animations.css?v=2.7.0">
    
    <!-- iOS 兼容性修复 -->
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('Error: ' + msg + '\nURL: ' + url + '\nLine: ' + lineNo + '\nColumn: ' + columnNo + '\nStack: ' + (error && error.stack));
            window.__lastError = msg + ' (Line ' + lineNo + ')';
            document.body.innerHTML = '<div style="padding:20px;color:red;font-family:monospace;">FATAL ERROR:<br>' + msg + '<br>Line: ' + lineNo + '</div>';
            return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
            console.error('Unhandled Rejection: ' + event.reason);
            window.__lastError = 'Unhandled Rejection: ' + event.reason;
        });
        // 检测 iOS 独立 Web App 模式
        window.isIOSStandalone = window.navigator.standalone || false;
        
        // iOS 存储兼容性修复
        window.safeLocalStorage = {
            setItem: function(key, value) {
                try {
                    localStorage.setItem(key, value);
                } catch (e) {
                    console.warn('localStorage 写入失败:', e);
                }
            },
            getItem: function(key) {
                try {
                    return localStorage.getItem(key);
                } catch (e) {
                    console.warn('localStorage 读取失败:', e);
                    return null;
                }
            }
        };
    </script>
</head>
<body>
    <!-- 底部标签栏 -->
    <nav class="tab-bar">
        <button class="tab-item active" data-page="home">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path>
            </svg>
            <span class="tab-label">记录</span>
        </button>
        <button class="tab-item" data-page="favorites">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
            </svg>
            <span class="tab-label">收藏</span>
        </button>
        <button class="tab-item" data-page="profile">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="8" r="4"></circle>
                <path d="M20 21a8 8 0 1 0-16 0"></path>
            </svg>
            <span class="tab-label">我</span>
        </button>
    </nav>

    <!-- 顶部导航 -->
    <header class="header">
        <h1 class="header-title">万物手札</h1>
        <p class="header-subtitle">记录世间万物，收藏生活点滴</p>
        
        <!-- 主题选择器 -->
        <div class="theme-selector">
            <div class="theme-toggle" id="theme-toggle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                </svg>
            </div>
            <div class="theme-panel" id="theme-panel">
                <h4>选择主题</h4>
                <div class="theme-options" id="theme-options">
                    <!-- 动态生成主题选项 -->
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 首页 - 记录列表 -->
        <section id="page-home" class="page active">
            <!-- 搜索栏 -->
            <div class="search-bar">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" class="search-input" id="search-input" placeholder="搜索名称、备注...">
            </div>
            
            <!-- 记录列表容器 -->
            <div class="items-container" id="items-container">
                <!-- 动态生成记录卡片 -->
            </div>
        </section>

        <!-- 收藏页 -->
        <section id="page-favorites" class="page">
            <div class="search-bar">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" class="search-input" id="search-input-favorites" placeholder="搜索收藏记录...">
            </div>
            <div class="items-container" id="favorites-container">
                <!-- 动态生成收藏卡片 -->
            </div>
            <div class="empty-state" id="empty-favorites">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                </svg>
                <p>还没有收藏</p>
                <p class="empty-state-hint">在记录页点击收藏按钮添加</p>
            </div>
        </section>

        <!-- 个人页面 -->
        <section id="page-profile" class="page">
            <div class="profile-container">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="8" r="4"></circle>
                            <path d="M20 21a8 8 0 1 0-16 0"></path>
                        </svg>
                    </div>
                    <h2 class="profile-name">用户</h2>
                </div>
                
                <div class="settings-container">
                    <div class="settings-section">
                        <h3 class="settings-section-title">数据管理</h3>
                        <button class="settings-item" id="export-data-btn">
                            <span>导出数据</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                        </button>
                        <button class="settings-item" id="import-data-btn">
                            <span>导入数据</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="settings-section">
                        <h3 class="settings-section-title">分类管理</h3>
                        <button class="settings-item" id="manage-categories-btn">
                            <span>自定义分类</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="settings-section">
                        <h3 class="settings-section-title">云同步</h3>
                        <button class="settings-item" id="cloud-sync-btn">
                            <span>同步设置</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 10h-4V6a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v4H2a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h4v4a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-4h4a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2z"></path>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="settings-section">
                        <h3 class="settings-section-title">关于</h3>
                        <div class="settings-item about-item">
                            <span>万物手札 v2.5.0</span>
                            <span class="about-version">自定义分类版</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    <!-- 新增分类弹窗 -->
    <div id="category-modal" class="modal">
        <div class="modal-content category-modal">
            <div class="modal-header">
                <h3>新增分类</h3>
                <button class="modal-close" id="close-category-modal">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="category-name-input">分类名称</label>
                    <input type="text" id="category-name-input" placeholder="输入分类名称，如：旅行、美食..." maxlength="20">
                </div>
                <button id="save-category-btn" class="btn-primary">保存</button>
            </div>
        </div>
    </div>

    <!-- 分类管理弹窗 -->
    <div id="category-manager-modal" class="modal">
        <div class="modal-content category-manager-modal">
            <div class="modal-header">
                <h3>管理分类</h3>
                <button class="modal-close" id="close-category-manager">×</button>
            </div>
            <div class="modal-body">
                <div id="category-list">
                    <!-- 动态渲染分类列表 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 同步设置弹窗 -->
    <div id="sync-modal" class="modal">
        <div class="modal-content sync-modal">
            <div class="modal-header">
                <h3>云同步设置</h3>
                <button class="modal-close" id="sync-modal-close">×</button>
            </div>
            <div class="modal-body">
                <!-- 同步状态 -->
                <div id="sync-status" class="sync-status"></div>
                
                <!-- 配置表单 -->
                <div class="sync-config-form">
                    <div class="form-group">
                        <label for="sync-gist-id">Gist ID</label>
                        <input type="text" id="sync-gist-id" placeholder="输入 Gist ID">
                    </div>
                    <div class="form-group">
                        <label for="sync-token">Gist Token</label>
                        <input type="password" id="sync-token" placeholder="输入 GitHub Token">
                    </div>
                    <div class="form-group">
                        <label for="sync-key">加密密钥</label>
                        <input type="password" id="sync-key" placeholder="设置加密密钥">
                    </div>
                    <button id="sync-save-config" class="btn-primary">保存配置</button>
                </div>
                
                <!-- 同步操作 -->
                <div id="sync-actions" class="sync-actions">
                    <button id="sync-upload" class="btn-sync">上传</button>
                    <button id="sync-download" class="btn-sync">下载</button>
                </div>
                
                <!-- 同步日志 -->
                <div id="sync-log" class="sync-log"></div>
            </div>
        </div>
    </div>

    <!-- 详情页 -->
    <section id="page-detail" class="page detail-page">
        <div class="page-header">
            <button class="back-btn" id="detail-back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="m15 18-6-6 6-6"></path>
                </svg>
            </button>
            <h2>详情</h2>
            <button class="detail-action-btn" id="detail-edit-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
            </button>
            <button class="detail-action-btn" id="detail-delete-btn" style="color: #ef4444;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 6h18"></path>
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                </svg>
            </button>
        </div>
        <div class="detail-content" id="detail-content">
            <!-- 动态生成详情内容 -->
        </div>
    </section>

    <!-- 编辑/新建表单页 -->
    <section id="page-form" class="page form-page">
        <div class="page-header">
            <button class="back-btn" id="create-back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="m15 18-6-6 6-6"></path>
                </svg>
            </button>
            <h2 id="create-title">新建记录</h2>
            <div class="form-actions">
                <button class="form-action-btn" id="create-save-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                </button>
            </div>
        </div>
        <div class="form-container">
            <div class="form-group">
                <label for="create-name">名称</label>
                <input type="text" id="create-name" placeholder="输入名称" required>
            </div>
            <div class="form-group">
                <label for="create-category">分类</label>
                <select id="create-category">
                    <!-- 动态渲染：预设 + 自定义 -->
                </select>
            </div>
            <div class="form-group">
                <label for="create-date">日期（可选）</label>
                <input type="date" id="create-date">
            </div>
            <div class="form-group">
                <label for="create-notes">备注</label>
                <textarea id="create-notes" placeholder="输入备注信息..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">照片</label>
                <div class="photo-upload-area">
                    <input type="file" id="create-photo-input" accept="image/*" multiple style="display:none;" />
                    <button type="button" id="create-photo-btn" class="btn-photo-add">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        添加照片
                    </button>
                    <p class="photo-hint">支持多选，照片将保存在本地</p>
                </div>
                <div class="photo-preview" id="photo-preview"></div>
            </div>
        </div>
    </section>

    <!-- 悬浮操作按钮 (FAB) -->
    <button class="fab" id="fab-add">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"></path>
        </svg>
    </button>

    <!-- 主题面板 -->
    <div class="theme-overlay" id="theme-overlay"></div>
    <div class="theme-selector-panel" id="theme-selector-panel">
        <h3>选择主题</h3>
        <div class="theme-grid" id="theme-grid">
            <!-- 动态生成主题选项 -->
        </div>
    </div>

    <!-- 导入文件输入 -->
    <input type="file" id="import-file-input" accept=".json" style="display: none;">

    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>

    <!-- JavaScript 模块 -->
    <!-- <script src="js/storage.js?v=2.7.5"></script> --> <!-- 已禁用：与 app.js 中的 Storage 冲突 -->
    <!-- <script src="js/ui.js?v=2.7.5"></script> --> <!-- 已禁用：功能已整合至 app.js，避免冗余加载 -->
    <script src="js/sync.js?v=2.8.2"></script>
    <script src="js/app.js?v=2.8.2"></script>
</body>
</html>
