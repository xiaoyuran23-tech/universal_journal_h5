<!DOCTYPE html>

    <link rel="stylesheet" href="style.css?v=3.2.1-hotfix.1">
    <link rel="stylesheet" href="animations.css?v=3.2.1-hotfix.1">
    
    <!-- iOS 兼容性修复 -->
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('Error: ' + msg + '\nURL: ' + url + '\nLine: ' + lineNo + '\nColumn: ' + columnNo + '\nStack: ' + (error && error.stack));
            window.__lastError = msg + ' (Line ' + lineNo + ')';
            document.body.innerHTML = '<div style="padding:20px;color:red;font-family:monospace;">FATAL ERROR:<br>' + msg + '<br>Line: ' + lineNo + '</div>';
            return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
            console.error('Unhandled Rejection: ' + event.reason);
            window.__lastError = 'Unhandled Rejection: ' + event.reason;
        });
        // 检测 iOS 独立 Web App 模式
        window.isIOSStandalone = window.navigator.standalone || false;
        
        // iOS 存储兼容性修复
        window.safeLocalStorage = {
            setItem: function(key, value) {
                try {
                    localStorage.setItem(key, value);
                } catch (e) {
                    console.warn('localStorage 写入失败:', e);
                }
            },
            getItem: function(key) {
                try {
                    return localStorage.getItem(key);
                } catch (e) {
                    console.warn('localStorage 读取失败:', e);
                    return null;
                }
            }
        };
    </script>
</head>
<body>
    <!-- 底部标签栏 -->
    <nav class="tab-bar">
        <button class="tab-item active" data-page="home">

            </svg>

        </button>
        <button class="tab-item" data-page="calendar">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">

                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>

        <button class="tab-item" data-page="timeline">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">

            <span class="tab-label">故事</span>
        </button>
        <button class="tab-item" data-page="favorites">

                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
            </svg>
            <span class="tab-label">收藏</span>
        </button>
        <button class="tab-item" data-page="profile">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="8" r="4"></circle>

    <!-- 顶部导航 -->

        <h1 class="header-title">万物手札</h1>
        <p class="header-subtitle">记录世间万物，收藏生活点滴</p>

                <!-- 动态渲染时间线 -->
            </div>

        <!-- 收藏页 -->

                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" class="search-input" id="search-input-favorites" placeholder="搜索收藏记录...">

                <div class="settings-container">

                        <button class="settings-item" id="export-data-btn">
                            <span>导出数据</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                        </button>
                        <button class="settings-item" id="import-data-btn">
                            <span>导入数据</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                        </button>
                        <button class="settings-item danger-item" id="clear-all-data-btn">
                            <span>清空数据</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="#ff4d4f" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                <line x1="10" y1="11" x2="10" y2="17"></line>
                                <line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="settings-section">
                        <h3 class="settings-section-title">分类管理</h3>
                        <button class="settings-item" id="manage-categories-btn">
                            <span>自定义分类</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="settings-section">
                        <h3 class="settings-section-title">模板管理</h3>
                        <button class="settings-item" id="manage-templates-btn">
                            <span>我的模板</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="settings-section">
                        <h3 class="settings-section-title">云同步</h3>
                        <button class="settings-item" id="cloud-sync-btn">
                            <span>同步设置</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 10h-4V6a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v4H2a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h4v4a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-4h4a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2z"></path>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="settings-section">
                        <h3 class="settings-section-title">关于</h3>
                        <div class="settings-item about-item">
                            <span>万物手札 v3.2.1-hotfix.1</span>
                            <span class="about-version">自定义分类版</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 模板管理页 -->
        <section id="page-template-manager" class="page">
            <div class="template-manager-header">
                <button class="tm-back-btn" id="tm-back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <path d="M19 12H5M12 19l-7-7 7-7"></path>
                    </svg>
                    返回
                </button>
                <h2 class="tm-title">模板管理</h2>
                <div></div>
            </div>
            <div class="template-manager-content" id="template-manager-container">
                <!-- 动态渲染模板列表 -->
            </div>
        </section>

        <!-- 新建/编辑记录页 -->
        <section id="page-form" class="page">
            <div class="form-header">
                <button class="form-back-btn" id="create-back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"></path>
                    </svg>
                    取消
                </button>
                <h2 class="form-title" id="create-title">新建记录</h2>
                <button class="form-save-btn" id="create-save-btn">保存</button>
            </div>
            
            <div class="form-body">
                <!-- 模板选择器 -->
                <div class="template-selector" id="template-selector" style="display:none;">
                    <!-- 动态渲染模板 -->
                </div>
                <button class="btn-use-template" id="btn-use-template">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="12" y1="8" x2="12" y2="16"></line>
                        <line x1="8" y1="12" x2="16" y2="12"></line>
                    </svg>
                    使用模板快速创建
                </button>
                <button class="btn-save-template" id="btn-save-template">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                    保存为模板
                </button>
                
                <div class="form-group">
                    <label for="create-name">名称</label>
                    <input type="text" id="create-name" placeholder="给这条记录起个名字" maxlength="100" autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label for="create-category">分类</label>
                    <select id="create-category">
                        <option value="">选择分类</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>标签</label>
                    <div class="tag-input-wrapper" id="tag-input-wrapper">
                        <input type="text" class="tag-input-field" id="create-tags" placeholder="输入标签，按回车或逗号添加" autocomplete="off">
                    </div>
                    <p class="form-hint">按回车、逗号或空格分隔标签，重复标签会自动忽略</p>
                    <div class="tag-suggestions" id="tag-suggestions"></div>
                </div>
                
                <div class="form-group">
                    <label for="create-rich-content">备注</label>
                    <div class="rich-editor" id="create-rich-content" contenteditable="true" placeholder="写下你的想法..."></div>
                </div>
                
                <div class="form-group">
                    <label for="create-status">状态</label>
                    <select id="create-status">
                        <option value="in-use">使用中</option>
                        <option value="idle">闲置</option>
                        <option value="lost">遗失</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="create-date">日期</label>
                    <input type="date" id="create-date">
                </div>
                
                <div class="form-group">
                    <label>照片</label>
                    <div class="photo-upload-progress" id="photo-upload-progress">
                        <div class="progress-header">
                            <span id="photo-progress-text">正在压缩...</span>
                            <span id="photo-progress-percent">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="photo-progress-fill"></div>
                        </div>
                    </div>
                    <div class="photo-preview" id="photo-preview"></div>
                    <div class="photo-summary" id="photo-summary" style="display: none;">
                        <span>📸 已添加 <span class="summary-count">0</span> 张照片</span>
                        <span class="summary-total">共节省 <span class="summary-saved">0 KB</span></span>
                    </div>
                    <input type="file" id="create-photo-input" accept="image/*" multiple style="display:none;">
                    <button type="button" id="create-photo-btn" class="btn-photo-add">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        添加照片
                    </button>
                </div>
            </div>
        </section>

        <!-- 详情页 -->
        <section id="page-detail" class="page">
            <div class="detail-header">
                <button class="detail-back-btn" id="detail-back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"></path>
                    </svg>
                    返回
                </button>
                <h2 class="detail-title">记录详情</h2>
                <div class="detail-actions">
                    <button class="detail-action-btn" id="detail-favorite-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                        </svg>
                    </button>
                    <button class="detail-action-btn" id="detail-edit-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                    </button>
                    <button class="detail-action-btn" id="detail-delete-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="detail-body" id="detail-body">
                <!-- 动态生成详情内容 -->
            </div>
        </section>

        <!-- 回收站页 -->
        <section id="page-trash" class="page">
            <div class="trash-header">
                <h2>🗑️ 回收站</h2>
                <p class="trash-desc">已删除的记录将保留 30 天</p>
            </div>
            <div class="items-container" id="trash-container">
                <!-- 动态生成回收站列表 -->
            </div>
        </section>

        <!-- 统计页 -->
        <section id="page-stats" class="page">
            <div class="stats-header">
                <h2>📊 数据统计</h2>
            </div>
            <div class="stats-container" id="stats-container">
                <!-- 动态生成统计内容 -->
            </div>
        </section>

    <!-- 新增分类弹窗 -->
    <div id="category-modal" class="modal">
        <div class="modal-content category-modal">
            <div class="modal-header">
                <h3>新增分类</h3>
                <button class="modal-close" id="close-category-modal">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="category-name-input">分类名称</label>
                    <input type="text" id="category-name-input" placeholder="输入分类名称，如：旅行、美食..." maxlength="20">
                </div>
                <button id="save-category-btn" class="btn-primary">保存</button>
            </div>
        </div>
    </div>

    <!-- 分类管理弹窗 -->
    <div id="category-manager-modal" class="modal">
        <div class="modal-content category-manager-modal">
            <div class="modal-header">
                <h3>管理分类</h3>
                <button class="modal-close" id="close-category-manager">×</button>
            </div>
            <div class="modal-body">
                <div id="category-list">
                    <!-- 动态渲染分类列表 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 同步设置弹窗 -->
    <div id="sync-modal" class="modal">
        <div class="modal-content sync-modal">
            <div class="modal-header">
                <h3>云同步设置</h3>
                <button class="modal-close" id="sync-modal-close">×</button>
            </div>
            <div class="modal-body">
                <!-- 同步状态 -->
                <div id="sync-status" class="sync-status"></div>
                
                <!-- 配置表单 -->
                <div class="sync-config-form">
                    <div class="form-group">
                        <label for="sync-gist-id">Gist ID</label>
                        <input type="text" id="sync-gist-id" placeholder="输入 Gist ID">
                    </div>
                    <div class="form-group">
                        <label for="sync-token">Gist Token</label>
                        <input type="password" id="sync-token" placeholder="输入 GitHub Token">
                    </div>
                    <div class="form-group">
                        <label for="sync-key">加密密钥</label>
                        <input type="password" id="sync-key" placeholder="设置加密密钥">
                    </div>
                    <button id="sync-save-config" class="btn-primary">保存配置</button>
                </div>
                
                <!-- 同步操作 -->
                <div id="sync-actions" class="sync-actions">
                    <button id="sync-upload" class="btn-sync">上传</button>
                    <button id="sync-download" class="btn-sync">下载</button>
                </div>
                
                <!-- 同步日志 -->
                <div id="sync-log" class="sync-log"></div>
            </div>
        </div>
    </div>

    <!-- 悬浮操作按钮 (FAB) -->
    <button class="fab" id="fab-add">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"></path>
        </svg>
    </button>

    <!-- 主题面板 -->
    <div class="theme-overlay" id="theme-overlay"></div>
    <div class="theme-selector-panel" id="theme-selector-panel">

        <div class="theme-grid" id="theme-grid">

    <!-- 导入文件输入 -->
    <input type="file" id="import-file-input" accept=".json" style="display: none;">
