<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <title>万物手札 - 通用物品管理工具</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
  <!-- 应用容器 -->
  <div id="app">
    <!-- 顶部导航 -->
    <header class="header">
      <h1 class="header-title">📦 万物手札</h1>
      <p class="header-subtitle">记录世间万物，收藏生活点滴</p>
      
      <!-- 主题选择器 -->
      <div class="theme-selector">
        <div class="theme-toggle" id="theme-toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
          </svg>
        </div>
        <div class="theme-panel" id="theme-panel">
          <h4>选择主题</h4>
          <div class="theme-options" id="theme-options">
            <!-- 动态生成主题选项 -->
          </div>
        </div>
      </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 首页 - 列表 -->
      <section id="page-home" class="page active">
        <!-- 搜索栏 -->
        <div class="search-bar">
          <div class="search-input-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input type="text" id="search-input" placeholder="搜索名称、备注..." />
          </div>
          <button class="search-btn" id="search-btn">搜索</button>
        </div>

        <!-- 分类筛选 -->
        <div class="category-filter" id="category-filter">
          <button class="category-item active" data-category="">全部</button>
          <!-- 动态生成其他分类 -->
        </div>

        <!-- 物品列表 -->
        <div class="items-list" id="items-list">
          <!-- 动态生成物品卡片 -->
        </div>

        <!-- 空状态 -->
        <div class="empty-state" id="empty-state" style="display: none;">
          <img src="assets/empty.png" alt="空状态" class="empty-icon" />
          <p class="empty-text">暂无记录</p>
          <button class="btn-primary" id="empty-add-btn">添加第一条</button>
        </div>

        <!-- 加载更多 -->
        <div class="load-more" id="load-more" style="display: none;">
          <span>加载中...</span>
        </div>
      </section>

      <!-- 添加页面 -->
      <section id="page-add" class="page">
        <div class="page-header">
          <button class="back-btn" id="add-back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="m15 18-6-6 6-6"></path>
            </svg>
          </button>
          <h2>添加物品</h2>
        </div>

        <div class="form-container">
          <!-- 图片上传区 -->
          <div class="upload-area" id="upload-area">
            <div class="upload-placeholder" id="upload-placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <path d="m21 15-5-5L5 21"></path>
              </svg>
              <p>拍照/上传</p>
              <span>支持图片/视频</span>
            </div>
            <div class="upload-preview" id="upload-preview"></div>
            <input type="file" id="file-input" accept="image/*,video/*" multiple style="display: none;" />
          </div>

          <!-- 表单 -->
          <div class="form-group">
            <label class="form-label">名称 *</label>
            <input type="text" id="item-name" class="form-input" placeholder="例如：龟背竹、高达模型、MacBook Pro" />
          </div>

          <div class="form-row">
            <div class="form-group" style="flex: 1;">
              <label class="form-label">主品类</label>
              <select id="item-category" class="form-select">
                <option value="植物">植物</option>
                <option value="手办">手办</option>
                <option value="书籍">书籍</option>
                <option value="数码">数码</option>
                <option value="宠物">宠物</option>
                <option value="其他">其他</option>
              </select>
            </div>
            <div class="form-group" style="flex: 1;">
              <label class="form-label">子分类</label>
              <input type="text" id="item-subcategory" class="form-input" placeholder="自定义" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">状态</label>
            <select id="item-status" class="form-select">
              <option value="在役">在役</option>
              <option value="闲置">闲置</option>
              <option value="已出">已出</option>
              <option value="绝版">绝版</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">备注/故事</label>
            <textarea id="item-desc" class="form-textarea" placeholder="记录来源、使用感受、养护笔记..." rows="4"></textarea>
          </div>

          <button class="btn-primary btn-block" id="submit-btn">保存入库</button>
        </div>
      </section>

      <!-- 详情页面 -->
      <section id="page-detail" class="page">
        <div class="page-header">
          <button class="back-btn" id="detail-back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="m15 18-6-6 6-6"></path>
            </svg>
          </button>
          <h2>物品详情</h2>
        </div>

        <div class="detail-container" id="detail-container">
          <!-- 动态加载详情 -->
        </div>
      </section>

      <!-- 统计页面 -->
      <section id="page-stats" class="page">
        <div class="stats-header">
          <h2>📊 统计面板</h2>
        </div>

        <div class="stats-cards">
          <div class="stat-card">
            <div class="stat-value" id="stat-total">0</div>
            <div class="stat-label">总记录</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-categories">0</div>
            <div class="stat-label">品类数</div>
          </div>
        </div>

        <div class="charts-container">
          <div class="chart-card">
            <h3>📂 品类分布</h3>
            <div id="category-chart" class="chart"></div>
          </div>
          <div class="chart-card">
            <h3>📦 状态分布</h3>
            <div id="status-chart" class="chart"></div>
          </div>
        </div>
      </section>
    </main>

    <!-- 底部 TabBar -->
    <nav class="tab-bar">
      <button class="tab-item active" data-page="home">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path>
        </svg>
        <span class="tab-label">手札</span>
      </button>
      <button class="tab-item" data-page="stats">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M18 20V10M12 20V4M6 20v-6"></path>
        </svg>
        <span class="tab-label">统计</span>
      </button>
    </nav>

    <!-- 悬浮添加按钮 -->
    <button class="fab" id="fab-add">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14"></path>
      </svg>
    </button>
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast">
    <span class="toast-message" id="toast-message"></span>
  </div>

  <script src="js/app.js"></script>
  <script src="js/charts.js"></script>
</body>
</html>
