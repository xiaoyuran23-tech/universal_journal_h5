<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" class="empty-illustration">
  <defs>
    <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb700;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5252;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景装饰 -->
  <circle cx="200" cy="150" r="100" fill="#fff9f0" opacity="0.6"/>
  
  <!-- 大星星 -->
  <g transform="translate(200, 120)">
    <path d="M0,-40 L10,-15 L35,-15 L15,5 L22,30 L0,18 L-22,30 L-15,5 L-35,-15 L-10,-15 Z" 
          fill="url(#starGradient)" opacity="0.3"/>
  </g>
  
  <!-- 收藏星标 -->
  <g transform="translate(150, 140)">
    <path d="M0,-24 L6,-9 L22,-9 L9,4 L14,20 L0,12 L-14,20 L-9,4 L-22,-9 L-6,-9 Z" 
          fill="url(#starGradient)" stroke="#ffb700" stroke-width="2"/>
  </g>
  
  <!-- 爱心 -->
  <g transform="translate(250, 150)">
    <path d="M0,8 C-12,0 -16,-8 -16,-14 A8,8 0 0,1 0,-14 A8,8 0 0,1 16,-14 C16,-8 12,0 0,8 Z" 
          fill="url(#heartGradient)" opacity="0.8"/>
  </g>
  
  <!-- 小星星点缀 -->
  <g transform="translate(100, 100)">
    <path d="M0,-8 L2,-3 L7,-3 L3,1 L4,6 L0,4 L-4,6 L-3,1 L-7,-3 L-2,-3 Z" 
          fill="url(#starGradient)" opacity="0.6"/>
  </g>
  
  <g transform="translate(300, 110)">
    <path d="M0,-6 L1.5,-2 L5,-2 L2,1 L3,5 L0,3 L-3,5 L-2,1 L-5,-2 L-1.5,-2 Z" 
          fill="url(#starGradient)" opacity="0.5"/>
  </g>
  
  <g transform="translate(120, 200)">
    <path d="M0,-5 L1,-2 L3,-2 L2,0 L2,3 L0,2 L-2,3 L-2,0 L-3,-2 L-1,-2 Z" 
          fill="url(#starGradient)" opacity="0.4"/>
  </g>
  
  <g transform="translate(280, 190)">
    <path d="M0,-7 L2,-2 L6,-2 L3,1 L4,5 L0,3 L-4,5 L-3,1 L-6,-2 L-2,-2 Z" 
          fill="url(#starGradient)" opacity="0.5"/>
  </g>
  
  <!-- 装饰点 -->
  <circle cx="90" cy="140" r="3" fill="#ffd700" opacity="0.6"/>
  <circle cx="310" cy="130" r="2" fill="#ffd700" opacity="0.5"/>
  <circle cx="110" cy="180" r="2" fill="#ffd700" opacity="0.4"/>
  <circle cx="290" cy="170" r="3" fill="#ffd700" opacity="0.5"/>
  
  <!-- 中心文字 -->
  <text x="200" y="260" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#6c6c6c" font-weight="500">暂无收藏</text>
  <text x="200" y="280" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#b8b8b8">点击星标收藏心仪的物品</text>
</svg>
