<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" class="empty-illustration">
  <defs>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a3a3a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景装饰 -->
  <circle cx="200" cy="150" r="120" fill="#fafafa" opacity="0.5"/>
  
  <!-- 主盒子 -->
  <g transform="translate(140, 100)">
    <!-- 盒子主体 -->
    <rect x="0" y="0" width="120" height="100" rx="12" fill="url(#boxGradient)" stroke="#d0d0d0" stroke-width="2"/>
    
    <!-- 盒子盖子 -->
    <path d="M-10,10 L130,10 L120,-10 L10,-10 Z" fill="url(#boxGradient)" stroke="#d0d0d0" stroke-width="2" stroke-linejoin="round"/>
    
    <!-- 盒子开口 -->
    <rect x="20" y="20" width="80" height="60" rx="4" fill="#ffffff" opacity="0.6"/>
    
    <!-- 装饰线条 -->
    <line x1="20" y1="40" x2="100" y2="40" stroke="#e8e8e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="55" x2="80" y2="55" stroke="#e8e8e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="70" x2="90" y2="70" stroke="#e8e8e8" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- 漂浮的物品图标 -->
  <g transform="translate(80, 80)">
    <circle cx="0" cy="0" r="20" fill="#f0f0f0" opacity="0.8"/>
    <path d="M-8,8 L0,-8 L8,8 Z" fill="url(#accentGradient)" opacity="0.6"/>
  </g>
  
  <g transform="translate(320, 90)">
    <circle cx="0" cy="0" r="16" fill="#f0f0f0" opacity="0.8"/>
    <rect x="-6" y="-6" width="12" height="12" rx="2" fill="url(#accentGradient)" opacity="0.6"/>
  </g>
  
  <g transform="translate(90, 240)">
    <circle cx="0" cy="0" r="14" fill="#f0f0f0" opacity="0.8"/>
    <circle cx="0" cy="0" r="8" fill="url(#accentGradient)" opacity="0.6"/>
  </g>
  
  <g transform="translate(310, 230)">
    <circle cx="0" cy="0" r="18" fill="#f0f0f0" opacity="0.8"/>
    <path d="M-8,-4 Q0,-10 8,-4 Q10,4 0,10 Q-10,4 -8,-4" fill="url(#accentGradient)" opacity="0.6"/>
  </g>
  
  <!-- 装饰点 -->
  <circle cx="60" cy="150" r="4" fill="#d0d0d0" opacity="0.6"/>
  <circle cx="340" cy="140" r="3" fill="#d0d0d0" opacity="0.6"/>
  <circle cx="70" cy="200" r="3" fill="#d0d0d0" opacity="0.6"/>
  <circle cx="330" cy="190" r="4" fill="#d0d0d0" opacity="0.6"/>
  
  <!-- 中心文字区域 -->
  <text x="200" y="270" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#6c6c6c" font-weight="500">暂无记录</text>
  <text x="200" y="290" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#b8b8b8">添加你的第一条手札吧</text>
</svg>
